  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>

    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Nunito:wght@300;400;500;600;700;800;900&family=Share+Tech+Mono&display=swap');

    :root {
      --bg-base: #060810;
      --bg-card: rgba(255,255,255,0.028);
      --bg-card-hover: rgba(255,255,255,0.052);
      --bg-surface: #0b0f1d;
      --bg-elevated: #0f1626;
      --orange: #ff6600;
      --orange-glow: rgba(255,102,0,0.38);
      --orange-dim: rgba(255,102,0,0.14);
      --orange-bright: #ff7c1a;
      --orange-deep: #cc4400;
      --blue: #3b82f6;
      --blue-dim: rgba(59,130,246,0.14);
      --purple: #8b5cf6;
      --purple-dim: rgba(139,92,246,0.14);
      --green: #10b981;
      --green-dim: rgba(16,185,129,0.14);
      --yellow: #f59e0b;
      --yellow-dim: rgba(245,158,11,0.14);
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.14);
      --cyan: #06b6d4;
      --cyan-dim: rgba(6,182,212,0.14);
      --text-primary: #f0f4fa;
      --text-secondary: #8fa3c0;
      --text-muted: #445570;
      --border: rgba(255,255,255,0.07);
      --border-orange: rgba(255,102,0,0.35);
      --radius: 18px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --sidebar-width: 240px;
      --header-height: 70px;
      --font-display: 'Outfit', 'Segoe UI', sans-serif;
      --font-body: 'Nunito', 'Segoe UI', sans-serif;
      --font-mono: 'Share Tech Mono', 'Courier New', monospace;
      --transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-base);
      font-family: var(--font-body);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* iOS safe area: pad bottom so nothing hides behind home indicator */
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse 900px 700px at -5% -5%, rgba(255,102,0,0.07) 0%, transparent 55%),
        radial-gradient(ellipse 700px 600px at 105% 105%, rgba(59,130,246,0.045) 0%, transparent 55%),
        radial-gradient(ellipse 400px 400px at 50% 0%, rgba(255,102,0,0.025) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,102,0,0.28); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,102,0,0.6); }

    select option { background: #0f1626; color: #f0f4fa; }
    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.6) sepia(1) saturate(3) hue-rotate(340deg); cursor: pointer; }

    /* === GLASSMORPHISM CARD === */
    .glass-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: var(--transition);
    }
    .glass-card:hover { background: var(--bg-card-hover); border-color: rgba(255,255,255,0.11); box-shadow: 0 8px 40px rgba(0,0,0,0.3); }

    /* === STAT CARDS === */
    .stat-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      padding: 22px;
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.28s ease;
      cursor: default;
    }
    .stat-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .stat-card:hover { transform: translateY(-5px) scale(1.01); }
    .stat-card:hover::after { opacity: 1; }

    .stat-card.orange { background: linear-gradient(145deg, #180c00, #231200); border: 1px solid rgba(255,102,0,0.22); }
    .stat-card.orange::after { box-shadow: inset 0 0 40px rgba(255,102,0,0.06); }
    .stat-card.orange:hover { box-shadow: 0 12px 40px rgba(255,102,0,0.22), 0 0 0 1px rgba(255,102,0,0.4); }
    .stat-card.blue { background: linear-gradient(145deg, #080e1e, #0b1228); border: 1px solid rgba(59,130,246,0.18); }
    .stat-card.blue:hover { box-shadow: 0 12px 40px rgba(59,130,246,0.18), 0 0 0 1px rgba(59,130,246,0.35); }
    .stat-card.purple { background: linear-gradient(145deg, #0d0818, #110b20); border: 1px solid rgba(139,92,246,0.18); }
    .stat-card.purple:hover { box-shadow: 0 12px 40px rgba(139,92,246,0.18), 0 0 0 1px rgba(139,92,246,0.35); }
    .stat-card.green { background: linear-gradient(145deg, #04100c, #061510); border: 1px solid rgba(16,185,129,0.18); }
    .stat-card.green:hover { box-shadow: 0 12px 40px rgba(16,185,129,0.18), 0 0 0 1px rgba(16,185,129,0.35); }
    .stat-card.yellow { background: linear-gradient(145deg, #140d00, #1a1100); border: 1px solid rgba(245,158,11,0.18); }
    .stat-card.yellow:hover { box-shadow: 0 12px 40px rgba(245,158,11,0.18), 0 0 0 1px rgba(245,158,11,0.35); }
    .stat-card.red { background: linear-gradient(145deg, #140303, #1a0606); border: 1px solid rgba(239,68,68,0.18); }
    .stat-card.red:hover { box-shadow: 0 12px 40px rgba(239,68,68,0.18), 0 0 0 1px rgba(239,68,68,0.35); }

    /* === SIDEBAR — premium redesign === */
    .sidebar {
      position: fixed;
      left: 0;
      top: var(--header-height);
      bottom: 0;
      width: var(--sidebar-width);
      background: rgba(6,8,16,0.96);
      border-right: 1px solid rgba(255,102,0,0.12);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      z-index: 100;
      overflow-y: auto;
      padding: 20px 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid transparent;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-family: var(--font-display);
      position: relative;
      overflow: hidden;
    }
    .sidebar-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--orange);
      border-radius: 0 3px 3px 0;
      opacity: 0;
      transform: scaleY(0.4);
      transition: var(--transition);
    }
    .sidebar-item:hover {
      background: rgba(255,102,0,0.07);
      color: var(--text-secondary);
      border-color: rgba(255,102,0,0.12);
      transform: translateX(4px);
    }
    .sidebar-item.active {
      background: rgba(255,102,0,0.12);
      border-color: rgba(255,102,0,0.3);
      color: var(--orange);
      box-shadow: 0 0 24px rgba(255,102,0,0.08), inset 0 0 24px rgba(255,102,0,0.04);
    }
    .sidebar-item.active::before { opacity: 1; transform: scaleY(1); }
    .sidebar-item.active .icon { filter: drop-shadow(0 0 6px rgba(255,102,0,0.7)); }
    .sidebar-item .icon { font-size: 17px; flex-shrink: 0; transition: var(--transition); }

    /* === HEADER — glass premium === */
    .app-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-height);
      background: rgba(6,8,16,0.92);
      border-bottom: 1px solid rgba(255,102,0,0.22);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      z-index: 200;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      box-shadow: 0 1px 0 rgba(255,102,0,0.18), 0 4px 40px rgba(0,0,0,0.4);
    }

    /* === MAIN CONTENT === */
    .main-content {
      margin-left: var(--sidebar-width);
      padding-top: var(--header-height);
      min-height: 100vh;
    }
    .content-area {
      padding: 28px;
      max-width: 1440px;
    }

    /* === BUTTONS — premium with active scale === */
    .btn-primary {
      background: linear-gradient(135deg, var(--orange-deep), var(--orange));
      border: none;
      color: white;
      padding: 11px 24px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12.5px;
      font-family: var(--font-display);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      transition: var(--transition);
      box-shadow: 0 4px 18px var(--orange-glow);
    }
    .btn-primary:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 28px var(--orange-glow);
      background: linear-gradient(135deg, var(--orange), var(--orange-bright));
    }
    .btn-primary:active { transform: scale(0.96); }

    .btn-secondary {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      color: var(--text-secondary);
      padding: 9px 18px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      font-family: var(--font-body);
      transition: var(--transition);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.14);
      color: var(--text-primary);
      transform: translateY(-1px);
    }
    .btn-secondary:active { transform: scale(0.97); }

    .btn-icon {
      background: rgba(255,102,0,0.09);
      border: 1px solid rgba(255,102,0,0.28);
      color: var(--orange);
      padding: 6px 13px;
      border-radius: var(--radius-xs);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      transition: var(--transition);
    }
    .btn-icon:hover {
      background: rgba(255,102,0,0.18);
      border-color: rgba(255,102,0,0.55);
      transform: scale(1.04);
      box-shadow: 0 0 12px rgba(255,102,0,0.2);
    }
    .btn-icon:active { transform: scale(0.96); }

    /* === SEARCH PILLS — premium === */
    .search-pill {
      padding: 8px 18px;
      border-radius: 50px;
      border: 1px solid;
      cursor: pointer;
      font-size: 11.5px;
      font-weight: 700;
      font-family: var(--font-display);
      letter-spacing: 0.7px;
      text-transform: uppercase;
      transition: var(--transition);
      white-space: nowrap;
    }
    .search-pill.active {
      background: var(--orange);
      border-color: var(--orange);
      color: white;
      box-shadow: 0 4px 16px var(--orange-glow);
    }
    .search-pill.inactive {
      background: transparent;
      border-color: rgba(255,255,255,0.09);
      color: var(--text-muted);
    }
    .search-pill.inactive:hover {
      border-color: rgba(255,102,0,0.4);
      color: var(--text-secondary);
      background: var(--orange-dim);
      transform: translateY(-1px);
    }

    /* === INPUTS — glowing focus === */
    .input-field {
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius-sm);
      padding: 13px 18px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: var(--font-body);
      width: 100%;
      outline: none;
      transition: var(--transition);
    }
    .input-field:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px var(--orange-dim), 0 0 20px rgba(255,102,0,0.1);
      background: rgba(255,102,0,0.04);
    }
    .input-field::placeholder { color: var(--text-muted); }

    .input-mono {
      font-family: var(--font-mono);
      font-size: 18px;
      letter-spacing: 4px;
      color: #ff8833;
    }

    /* === SECTION TITLE === */
    .section-title {
      font-family: var(--font-display);
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--orange);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(255,102,0,0.4), transparent);
    }

    /* === PAGE HEADER === */
    .page-header { margin-bottom: 32px; }
    .page-title {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: 0.5px;
      line-height: 1;
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 7px;
      font-weight: 400;
    }

    /* === BADGE === */
    .badge {
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-family: var(--font-display);
    }
    .badge-orange { background: rgba(255,102,0,0.12); color: var(--orange); border: 1px solid rgba(255,102,0,0.28); }
    .badge-blue { background: rgba(59,130,246,0.12); color: #60a5fa; border: 1px solid rgba(59,130,246,0.28); }
    .badge-green { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.28); }
    .badge-red { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.28); }
    .badge-yellow { background: rgba(245,158,11,0.12); color: #fcd34d; border: 1px solid rgba(245,158,11,0.28); }
    .badge-muted { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.08); }
    .badge-scrap { background: rgba(239,68,68,0.14); color: #f87171; border: 1px solid rgba(239,68,68,0.35); }

    /* === TABLE — refined === */
    .premium-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .premium-table thead tr { background: rgba(255,255,255,0.025); border-bottom: 1px solid rgba(255,102,0,0.3); }
    .premium-table th {
      padding: 13px 15px;
      text-align: left;
      color: var(--orange);
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      white-space: nowrap;
      font-family: var(--font-display);
    }
    .premium-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.15s ease;
    }
    .premium-table tbody tr:hover { background: rgba(255,102,0,0.04); }
    .premium-table tbody tr:nth-child(even) { background: rgba(255,255,255,0.013); }
    .premium-table tbody tr:nth-child(even):hover { background: rgba(255,102,0,0.04); }
    .premium-table td { padding: 11px 15px; color: var(--text-secondary); vertical-align: middle; }

    /* === DISTRIBUTION BAR === */
    .dist-bar {
      height: 8px;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      gap: 2px;
    }
    .dist-bar-seg {
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    /* === LOGIN SCREEN === */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: radial-gradient(ellipse 800px 600px at 30% 40%, rgba(255,102,0,0.08), transparent 60%);
    }
    .login-card {
      background: rgba(11,15,29,0.97);
      border: 1px solid rgba(255,102,0,0.28);
      border-radius: 28px;
      padding: 44px 40px;
      width: 390px;
      max-width: 96vw;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
    }

    /* === TOAST === */
    .toast {
      position: fixed;
      top: 28px;
      right: 28px;
      z-index: 9999;
      padding: 14px 22px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 13.5px;
      min-width: 230px;
      text-align: center;
      backdrop-filter: blur(16px);
      animation: slideIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toast.success { background: rgba(16,185,129,0.92); color: white; border: 1px solid rgba(16,185,129,0.5); box-shadow: 0 8px 32px rgba(16,185,129,0.28); }
    .toast.error { background: rgba(239,68,68,0.92); color: white; border: 1px solid rgba(239,68,68,0.5); box-shadow: 0 8px 32px rgba(239,68,68,0.28); }
    @keyframes slideIn { from { transform: translateX(110px) scale(0.9); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }

    /* === STATUS DOT === */
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 5px var(--green); } 50% { box-shadow: 0 0 16px var(--green); } }

    /* === MODAL === */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 10500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(6px);
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes loadbar { 0% { width: 0%; margin-left: 0; } 50% { width: 70%; margin-left: 15%; } 100% { width: 0%; margin-left: 100%; } }
    .modal-card {
      background: rgba(11,15,29,0.99);
      border: 1px solid rgba(255,102,0,0.28);
      border-radius: 26px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.04);
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: modalIn 0.24s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes modalIn { from { transform: scale(0.93) translateY(12px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

    /* === EDIT FORM GRID === */
    .edit-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px 22px;
    }
    .edit-form-label {
      font-size: 9.5px;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 2.2px;
      margin-bottom: 6px;
      font-weight: 700;
      font-family: var(--font-display);
    }
    .edit-form-input {
      width: 100%;
      background: rgba(255,255,255,0.038);
      border: 1px solid rgba(255,102,0,0.22);
      color: var(--text-primary);
      padding: 9px 13px;
      border-radius: var(--radius-xs);
      font-size: 12.5px;
      outline: none;
      transition: var(--transition);
      box-sizing: border-box;
      font-family: var(--font-body);
    }
    .edit-form-input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px var(--orange-dim);
      background: rgba(255,102,0,0.05);
    }

    /* === READ-ONLY / LOCKED FIELDS === */
    .edit-form-input-readonly {
      width: 100%;
      background: rgba(255,255,255,0.013);
      border: 1px solid rgba(255,255,255,0.06);
      color: rgba(240,244,250,0.42);
      padding: 9px 13px;
      border-radius: var(--radius-xs);

  const isScrapped = (v) => {
    const loc = (v.location||'').trim().toLowerCase();

  const handleSearch = () => {
    if (searchMode === 'vms') {
      const full = vmsQ.join('');
      if (full.length < 8) { showToast('Enter all 8 digits (YYYY-NNNN)', 'error'); return; }
      const vmsStr = full.slice(0,4) + '-' + full.slice(4,8);
      const found = vehicles.filter(v => v.vms_no && v.vms_no.trim().startsWith(vmsStr));
      setSearchResult(found.length > 0 ? found : null);
      setSearched(true);
      setEditingLoc(false);
      if (!found.length) showToast('No vehicles found for VMS No ' + vmsStr, 'error');
      return;
    }
    const q = searchQ.trim();
    if (!q) { showToast('Please select or enter a value', 'error'); return; }
    if (searchMode === 'chassis' && q.length < 3) { showToast('Enter at least 3 digits', 'error'); return; }
    let found;
    const bO = ['Production','Pilot 2','Pilot','Pre Pilot','Proto 2','Proto 1','Mule'];
    const sortFn = (a,b) => {
      // Scrapped always at bottom
      if (isScrapped(a) && !isScrapped(b)) return 1;
      if (!isScrapped(a) && isScrapped(b)) return -1;
      const ai=bO.indexOf(a.batch?.trim()||''),bi=bO.indexOf(b.batch?.trim()||'');
      return (ai===-1?999:ai)-(bi===-1?999:bi);
    };
    if (searchMode === 'chassis') {
      const last5 = q.slice(-5).toLowerCase();
      found = vehicles.filter(v => v.chassis_number && v.chassis_number.slice(-5).toLowerCase() === last5);
      // put scrapped at bottom
      found = [...found.filter(v=>!isScrapped(v)), ...found.filter(v=>isScrapped(v))];
    } else if (searchMode === 'model') {
      found = vehicles.filter(v => v.model_name && v.model_name.trim().toLowerCase() === q.toLowerCase()).sort(sortFn);
    } else if (searchMode === 'project') {
      found = vehicles.filter(v => v.project && v.project.trim().toUpperCase() === q.toUpperCase()).sort(sortFn);
    } else {
      found = vehicles.filter(v => v.location && v.location.trim().toLowerCase() === q.trim().toLowerCase());
    }
    setSearchResult(found.length > 0 ? found : null);
    setSearched(true);
    setEditingLoc(false);
    if (!found.length) showToast('No vehicles found', 'error');
  };

    const engPart = engineNumber ? `\n*Engine No:* ${engineNumber}` : '';
    const testPart = test ? `\n*Test:* ${test}` : '';

  const handleImportExcel = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = ''; // reset so same file can be re-selected
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
        if (!rows.length) { showToast('No data found in file', 'error'); return; }

        // Flexible column mapping — supports various header name formats
        const norm = (s) => String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
        const colMap = {
          vms_no:       ['vmsno','vms no','vms_no','vms number'],
          project:      ['project','proj'],
          model_name:   ['modelname','model name','model_name','model'],
          make:         ['make'],
          batch:        ['batch'],
          chassis_number:['chassisnumber','chassis number','chassis_number','chassis no','chassisno','chassis'],
          engine_number: ['enginenumber','engine number','engine_number','engine no','engineno','engine'],
          location:     ['location','loc'],
          parking_spot: ['parkingspot','parking spot','parking_spot','parking'],
          test:         ['test'],
          current_status:['currentstatus','current status','current_status','status'],
          date:         ['date'],
          team_ownership:['teamownership','team ownership','team_ownership','team'],
        };

        // Detect column mapping from first row headers
        const headers = Object.keys(rows[0]);
        const getField = (row, fieldKey) => {
          const aliases = colMap[fieldKey];
          for (const h of headers) {
            if (aliases.includes(norm(h))) return String(row[h]||'').trim();
          }
          return '';
        };

        const existingChassis = new Set(vehicles.map(v => (v.chassis_number||'').toUpperCase().trim()));
        const added = [], skipped = [];

        rows.forEach((row, idx) => {
          const chassis = getField(row, 'chassis_number');
          if (!chassis) { skipped.push({row: idx+2, chassis:'(empty)', reason:'No chassis number'}); return; }
          if (existingChassis.has(chassis.toUpperCase())) {
            skipped.push({row: idx+2, chassis, reason:'Duplicate chassis'}); return;
          }
          existingChassis.add(chassis.toUpperCase());
          added.push({
            vms_no:         getField(row,'vms_no'),
            project:        getField(row,'project'),
            model_name:     getField(row,'model_name'),
            make:           getField(row,'make'),
            batch:          getField(row,'batch'),
            chassis_number: chassis,
            engine_number:  getField(row,'engine_number'),
            location:       getField(row,'location'),
            parking_spot:   getField(row,'parking_spot'),
            test:           getField(row,'test'),
            current_status: getField(row,'current_status'),
            date:           getField(row,'date'),
            team_ownership: getField(row,'team_ownership'),
          });
        });

        setImportModal({added, skipped, confirmed: false});
      } catch(err) {
        showToast('Failed to read file: ' + err.message, 'error');
      }
    };
    reader.readAsBinaryString(file);
  };

    const newVehicles = importModal.added.map((v, i) => ({id: maxId + i + 1, ...v, owner:'', test_purpose:''}));
    setVehicles(prev => [...prev, ...newVehicles]);
    showToast(`✅ Imported ${newVehicles.length} new vehicle${newVehicles.length!==1?'s':''}!`);
    setImportModal(null);
  };

  const deptSummary = useMemo(() => {
    const counts = {};
    vehicles.forEach(v => { const loc=(v.location||'').trim(); if(loc) counts[loc]=(counts[loc]||0)+1; });
    const allDepts = new Set([...LOCATION_OPTIONS, ...Object.keys(counts), ...customDepts.map(d=>d.name)]);
    const effectiveCap = (dept) => {
      if (customCapacities[dept] !== undefined) return customCapacities[dept];
      const cd = customDepts.find(d => d.name === dept);
      if (cd) return cd.capacity;
      return DEPT_CAPACITIES[dept] ?? null;
    };
    return [...allDepts].filter(d => d && d !== 'null' && !removedDepts.includes(d)).map(dept => {
      const actual = counts[dept] || 0;
      const capacity = effectiveCap(dept);
      return { dept, actual, capacity, available: capacity !== null ? capacity - actual : null };
    });

  const filteredSummary = useMemo(() =>

      if (!map[model]) map[model] = { total: 0, batches: {} };
      map[model].total += 1;
      if (!map[model].batches[batch]) map[model].batches[batch] = 0;
      map[model].batches[batch] += 1;
    });
    return Object.entries(map).map(([model, data]) => ({
      model, total: data.total,
      batches: Object.entries(data.batches).map(([batch, count]) => ({ batch, count }))
        .sort((a,b) => { const ai=BATCH_ORDER.indexOf(a.batch),bi=BATCH_ORDER.indexOf(b.batch); if(ai!==-1&&bi!==-1)return ai-bi; if(ai!==-1)return -1; if(bi!==-1)return 1; return a.batch.localeCompare(b.batch); })
    })).sort((a,b) => b.total - a.total);
  }, [vehicles]);

  const handleAddVehicle = () => {

  const statusBadge = (available, capacity) => {

    if (available < 0) return <span style={{background:'#e02020',color:'#fff',padding:'2px 9px',borderRadius:4,fontSize:11,fontWeight:700}}>OVER</span>;
    if (available === 0) return <span style={{background:'#ff7a00',color:'#fff',padding:'2px 9px',borderRadius:4,fontSize:11}}>FULL</span>;

  // ── Parking spot helpers ─────────────────────────────────────────────────
  // Returns prefix used for non-VA locations, e.g. "RTB" → "RTB"
  const getParkingPrefix = (loc) => {
    if (!loc) return null;
    const l = loc.trim();
    if (l === 'VA Stores' || l === 'VA Store') return 'S'; // VA Stores uses S1-S132
    if (l === 'VA') return 'VA'; // VA bay uses VA1-VA20
    return l.replace(/\s+/g,'').toUpperCase().slice(0,6);
  };

  // Returns total spot count for a location (from DEPT_CAPACITIES or custom)
  const getLocationCapacity = (loc) => {
    if (!loc) return null;
    const l = loc.trim();
    if (l === 'VA Stores' || l === 'VA Store') return 132;
    if (l === 'VA') return 20;
    const effectiveCap = (dept) => {
      if (customCapacities[dept] !== undefined) return customCapacities[dept];
      const cd = customDepts.find(d => d.name === dept);
      if (cd) return cd.capacity;
      return DEPT_CAPACITIES[dept] ?? null;
    };
    return effectiveCap(l);
  };

  // Returns array of available parking spots for a location, excluding spots
  // already taken by OTHER vehicles (not the current vehicle being edited).
  const getAvailableSpots = (loc, excludeVehicleId = null) => {
    if (!loc) return [];
    const prefix = getParkingPrefix(loc);
    if (!prefix) return [];
    const capacity = getLocationCapacity(loc);
    if (!capacity) return [];

    // Build set of occupied spots at this location (by other vehicles)
    const occupied = new Set(
      vehicles
        .filter(v => {
          const sameLocation = (v.location||'').trim() === loc.trim();
          const notSelf = excludeVehicleId !== null ? v.id !== excludeVehicleId : true;
          return sameLocation && notSelf && v.parking_spot;
        })
        .map(v => v.parking_spot)
    );

    const allSpots = Array.from({length: capacity}, (_, i) => `${prefix}${i + 1}`);
    return allSpots.filter(s => !occupied.has(s));
  };

  // ─────────────────────────────────────────────────────────────────────────

  const TEAM_OPTIONS = ['VA','EEE','Engine','CAL','Styling','ODT','Service','For Other Dept'];

  const EditForm = ({fd}) => (

          ) : key==='team_ownership' ? (

  const exportData = async (format) => {
    const now = new Date();
    const dateStr = now.toISOString().slice(0,10);
    const timeStr = now.toTimeString().slice(0,8).replace(/:/g,'-');
    const filename = 'KTM_VehicleData_' + dateStr + '_' + timeStr;
    const headers = ['ID','VMS No','Project','Model Name','Make','Batch','Chassis Number','Engine Number','Location','Parking Spot','Test','Current Status','Date','Team Ownership'];

    if (format === 'csv') {
      const rows = vehicles.map(v => [
        v.id, v.vms_no, v.project, v.model_name, v.make, v.batch,
        v.chassis_number, v.engine_number, v.location, v.parking_spot,
        v.test, v.current_status, v.date, v.team_ownership
      ].map(cell => {
        const s = String(cell ?? '');
        return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g,'""') + '"' : s;
      }));
      const csvContent = [headers.join(','), ...rows.map(r=>r.join(','))].join('\n');
      // Mobile-compatible: use base64 data URL instead of blob URL
      const csvB64 = btoa(unescape(encodeURIComponent(csvContent)));
      const a = document.createElement('a');
      a.href = 'data:text/csv;charset=utf-8;base64,' + csvB64;
      a.download = filename + '.csv';
      a.style.display = 'none';
      document.body.appendChild(a); a.click();
      setTimeout(() => document.body.removeChild(a), 500);
      showToast('CSV saved to Downloads! (' + vehicles.length + ' vehicles)');
    }

    if (format === 'json') {
      const exportObj = {
        exported_at: now.toISOString(),
        total_vehicles: vehicles.length,
        vehicles: vehicles.map(v => ({
          id: v.id, vms_no: v.vms_no, project: v.project, model_name: v.model_name,
          make: v.make, batch: v.batch, chassis_number: v.chassis_number,
          engine_number: v.engine_number, location: v.location, parking_spot: v.parking_spot,
          test: v.test, current_status: v.current_status, date: v.date, team_ownership: v.team_ownership
        }))
      };
      const jsonStr = JSON.stringify(exportObj, null, 2);
      const jsonB64 = btoa(unescape(encodeURIComponent(jsonStr)));
      const a = document.createElement('a');
      a.href = 'data:application/json;charset=utf-8;base64,' + jsonB64;
      a.download = filename + '.json';
      a.style.display = 'none';
      document.body.appendChild(a); a.click();
      setTimeout(() => document.body.removeChild(a), 500);
      showToast('JSON saved to Downloads! (' + vehicles.length + ' vehicles)');
    }

    if (format === 'excel') {
      try {
        // Build worksheet data array
        const wsData = [headers];
        vehicles.forEach(v => {
          wsData.push([
            v.id ?? '', v.vms_no ?? '', v.project ?? '', v.model_name ?? '',
            v.make ?? '', v.batch ?? '', v.chassis_number ?? '', v.engine_number ?? '',
            v.location ?? '', v.parking_spot ?? '', v.test ?? '',
            v.current_status ?? '', v.date ?? '', v.team_ownership ?? ''
          ]);
        });

        // Create workbook and worksheet using SheetJS
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(wsData);

        // Set column widths
        ws['!cols'] = [
          {wch:6},{wch:14},{wch:8},{wch:22},{wch:10},{wch:12},
          {wch:20},{wch:18},{wch:16},{wch:14},{wch:30},{wch:40},{wch:12},{wch:16}
        ];

        // Style header row (bold + orange background)
        const range = XLSX.utils.decode_range(ws['!ref']);
        for (let C = range.s.c; C <= range.e.c; C++) {
          const cellAddr = XLSX.utils.encode_cell({r:0, c:C});
          if (!ws[cellAddr]) continue;
          ws[cellAddr].s = {
            fill: {fgColor: {rgb: 'FF5500'}},
            font: {bold: true, color: {rgb: 'FFFFFF'}},
            alignment: {horizontal: 'center'}
          };
        }

        XLSX.utils.book_append_sheet(wb, ws, 'Vehicle Data');

        // Write and trigger download — browser saves to Downloads automatically
        // Generate Excel file as base64
        const wbout = XLSX.write(wb, {bookType:'xlsx', type:'base64'});
        // Try File System Access API (shows "Save As" dialog on supported browsers)
        if (window.showSaveFilePicker) {
          try {
            const fileHandle = await window.showSaveFilePicker({
              suggestedName: filename + '.xlsx',
              types: [{
                description: 'Excel Workbook',
                accept: {'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx']}
              }]
            });
            const writable = await fileHandle.createWritable();
            // Convert base64 to Uint8Array for writing
            const binStr = atob(wbout);
            const bytes = new Uint8Array(binStr.length);
            for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
            await writable.write(bytes);
            await writable.close();
          } catch(saveErr) {
            if (saveErr.name !== 'AbortError') {
              // User cancelled or API failed — fall back to direct download
              const a = document.createElement('a');
              a.href = 'data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,' + wbout;
              a.download = filename + '.xlsx';
              a.style.display = 'none';
              document.body.appendChild(a); a.click();
              setTimeout(() => document.body.removeChild(a), 500);
            }
          }
        } else {
          // Mobile / unsupported — direct download via base64 data URL
          const a = document.createElement('a');
          a.href = 'data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,' + wbout;
          a.download = filename + '.xlsx';
          a.style.display = 'none';
          document.body.appendChild(a); a.click();
          setTimeout(() => document.body.removeChild(a), 500);
        }
        showToast('Excel file saved to Downloads! (' + vehicles.length + ' vehicles)');
      } catch(e) {
        // Fallback: CSV with .xlsx extension if SheetJS not loaded
        const rows = vehicles.map(v => [
          v.id,v.vms_no,v.project,v.model_name,v.make,v.batch,
          v.chassis_number,v.engine_number,v.location,v.parking_spot,
          v.test,v.current_status,v.date,v.team_ownership
        ].map(cell => {
          const s = String(cell ?? '');
          return s.includes(',') || s.includes('"') ? '"' + s.replace(/"/g,'""') + '"' : s;
        }));
        const csv = [headers.join(','), ...rows.map(r=>r.join(','))].join('\n');
        const csvB64 = btoa(unescape(encodeURIComponent(csv)));
        const a = document.createElement('a');
        a.href = 'data:text/csv;charset=utf-8;base64,' + csvB64;
        a.download = filename + '.csv';
        a.style.display = 'none';
        document.body.appendChild(a); a.click();
        setTimeout(() => document.body.removeChild(a), 500);
        showToast('Exported as CSV (Excel library not loaded)');
      }
    }
  };

  // ── Full Data Import: Modular Functions ──────────────────────────────────────

  /** Step 1 — open the PIN modal */
  const openFullImportFlow = () => {
    setFullImportStep('pin');
    setFullImportPin('');
    setFullImportPinError('');
    setFullImportError('');
  };

  /** Step 2 — validate PIN */
  const validatePIN = () => {
    if (fullImportPin.trim() === '2908') {
      setFullImportStep('confirm');
      setFullImportPinError('');
    } else {
      setFullImportPinError('Unauthorized Access');
    }
  };

  /** Step 3 — clear all vehicle data */
  const clearAllData = () => {
    setVehicles([]);
    // Also clear any search results / edit state
    setSearchResult(null);
    setSearched(false);
    setSearchQ('');
    setVmsQ(['','','','','','','','']);
    setEditingVehicleId(null);
    setVehicleForm({});
  };

  /** Step 4 — process incoming Excel rows into vehicle records */
  const processData = (rows) => {
    const norm = (s) => String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
    const colMap = {
      vms_no:         ['vmsno','vms no','vms_no','vms number'],
      project:        ['project','proj'],
      model_name:     ['modelname','model name','model_name','model'],
      make:           ['make'],
      batch:          ['batch'],
      chassis_number: ['chassisnumber','chassis number','chassis_number','chassis no','chassisno','chassis'],
      engine_number:  ['enginenumber','engine number','engine_number','engine no','engineno','engine'],
      location:       ['location','loc'],
      parking_spot:   ['parkingspot','parking spot','parking_spot','parking'],
      test:           ['test'],
      current_status: ['currentstatus','current status','current_status','status'],
      date:           ['date'],
      team_ownership: ['teamownership','team ownership','team_ownership','team'],
    };
    const headers = Object.keys(rows[0]);
    const getField = (row, fieldKey) => {
      const aliases = colMap[fieldKey];
      for (const h of headers) {
        if (aliases.includes(norm(h))) return String(row[h]||'').trim();
      }
      return '';
    };

    const seenChassis = new Set();
    const processed = [];

    rows.forEach((row, idx) => {
      // Skip blank rows
      const isBlank = Object.values(row).every(v => !String(v||'').trim());
      if (isBlank) return;

      const chassis = getField(row, 'chassis_number');
      if (!chassis) return; // skip rows without chassis

      const chassisUpper = chassis.toUpperCase();
      if (seenChassis.has(chassisUpper)) return; // deduplicate
      seenChassis.add(chassisUpper);

      processed.push({
        id: idx + 1,
        vms_no:         getField(row, 'vms_no'),
        project:        getField(row, 'project'),
        model_name:     getField(row, 'model_name'),
        make:           getField(row, 'make'),
        batch:          getField(row, 'batch'),
        chassis_number: chassis,
        engine_number:  getField(row, 'engine_number'),
        location:       getField(row, 'location'),
        parking_spot:   getField(row, 'parking_spot'),
        test:           getField(row, 'test'),
        current_status: getField(row, 'current_status'),
        date:           getField(row, 'date'),
        team_ownership: getField(row, 'team_ownership'),
        owner: '',
        test_purpose: '',
      });
    });

    return processed;
  };

  /** Step 5 — update UI after import */
  const updateUI = (count) => {
    setFullImportCount(count);
    setFullImportStep('done');
  };

  /** Main import handler — triggered by file picker */
  const importExcel = (e) => {
    const file = e.target.files[0];
    e.target.value = '';
    if (!file) return;

    const ext = file.name.split('.').pop().toLowerCase();
    if (!['xlsx','xls'].includes(ext)) {
      setFullImportError('Please upload a valid Excel file (.xlsx or .xls)');
      setFullImportStep('confirm');
      return;
    }

    setFullImportStep('loading');
    setFullImportError('');

    const reader = new FileReader();
    reader.onload = (evt) => {
      // Use setTimeout to avoid UI freeze on large files
      setTimeout(() => {
        try {
          const wb = XLSX.read(evt.target.result, { type: 'binary', cellDates: true });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { defval: '', raw: false });

          if (!rows.length) {
            setFullImportError('No data found in the file');
            setFullImportStep('confirm');
            return;
          }

          // Clear old data first
          clearAllData();

          // Process & deduplicate
          const newData = processData(rows);

          if (!newData.length) {
            setFullImportError('No valid records found — ensure Chassis Number column exists');
            setFullImportStep('confirm');
            return;
          }

          // Re-assign sequential IDs
          const finalData = newData.map((v, i) => ({ ...v, id: i + 1 }));

          setVehicles(finalData);
          updateUI(finalData.length);
          showToast(`✅ New data imported successfully — ${finalData.length} records`, 'success');
        } catch (err) {
          setFullImportError('Import failed. Check file format: ' + (err.message || 'Unknown error'));
          setFullImportStep('confirm');
        }
      }, 50);
    };
    reader.onerror = () => {
      setFullImportError('Import failed. Could not read the file.');
      setFullImportStep('confirm');
    };
    reader.readAsBinaryString(file);
  };

  /** Export current data as backup before reset */
  const exportBackupBeforeReset = async () => {
    if (!vehicles.length) { showToast('No data to backup', 'error'); return; }
    const headers = ['ID','VMS No','Project','Model Name','Make','Batch','Chassis Number','Engine Number',
      'Location','Parking Spot','Test','Current Status','Date','Team Ownership'];
    const ws = XLSX.utils.aoa_to_sheet([
      headers,
      ...vehicles.map(v => [v.id,v.vms_no,v.project,v.model_name,v.make,v.batch,
        v.chassis_number,v.engine_number,v.location,v.parking_spot,
        v.test,v.current_status,v.date,v.team_ownership])
    ]);
    const wb = XLSX.utils.book_new();

                            {TEAM_OPTIONS.map(t=><option key={t} value={t}>{t}</option>)}

                          <input type="text" value={fd[key]||''} onChange={e=>handleVehicleFormChange(key,e.target.value)}
                            className="edit-form-input"
                            style={{fontFamily:key==='chassis_number'||key==='engine_number'?'var(--font-mono)':'inherit'}}/>

                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

                  <span style={{fontSize:20}}>🔍</span>
                </div>
                <div>
                  <div style={{fontFamily:'var(--font-display)',fontSize:16,fontWeight:700,color:'var(--text-primary)',letterSpacing:1,textTransform:'uppercase'}}>Find a Vehicle</div>

              <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
                {[{id:'chassis',label:'🔢 Chassis'},{id:'vms',label:'📄 VMS No'},{id:'model',label:'🏍 Model'},{id:'project',label:'📁 Project'},{id:'location',label:'📍 Location'}].map(m=>(

              </div>

              {searchMode==='chassis' && (
                <div>
                  <div style={{display:'flex',gap:10,alignItems:'center'}}>
                    <input value={searchQ} onChange={e=>setSearchQ(e.target.value.toUpperCase())} onKeyDown={e=>e.key==='Enter'&&handleSearch()}
                      placeholder="e.g. 45370" maxLength={5}
                      style={{flex:1,maxWidth:220,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,102,0,0.3)',borderRadius:12,padding:'12px 18px',color:'#ffa040',fontSize:22,fontFamily:'var(--font-mono)',letterSpacing:6,outline:'none',boxSizing:'border-box',transition:'all 0.2s'}}
                      onFocus={e=>{e.target.style.borderColor='var(--orange)';e.target.style.boxShadow='0 0 0 3px rgba(255,102,0,0.15)';}}
                      onBlur={e=>{e.target.style.borderColor='rgba(255,102,0,0.3)';e.target.style.boxShadow='none';}}/>
                    <button onClick={handleSearch} className="btn-primary" style={{padding:'12px 24px',fontSize:14,borderRadius:12}}>SEARCH</button>
                  </div>

                            const nq=[...vmsQ]; nq[i]=v;

                            if(v&&i<3) document.getElementById(`vms-${i+1}`)?.focus();
                            if(v&&i===3) document.getElementById('vms-dash')?.focus();

                          onKeyDown={e=>{
                            if(e.key==='Backspace'&&!vmsQ[i]&&i>0){const nq=[...vmsQ];nq[i-1]='';setVmsQ(nq);document.getElementById(`vms-${i-1}`)?.focus();}

                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <div style={{height:2,width:20,background:'#2a3a2a'}}></div>
                        <span style={{fontSize:8,color:'#3a5a3a',letterSpacing:2,textTransform:'uppercase',fontWeight:700}}>🧱 NORTH WALL</span>

                    {vaRow1.map((n,idx)=>(
                      <div key={n} style={{

                        borderRadius:5,
                        border: vaMap[`VA${n}`] ? '1.5px solid #ffb74d' : '1.5px solid #2a6a2a',

                        <SlotCell label={vaLabelFn(n)} veh={vaMap[vaLabelFn(n)]} accentColor='#ff9800' accentBorder='#ffb74d' accentText='#1a0800'/>

                  <div style={{margin:'4px 8px',display:'flex',alignItems:'center',gap:6,background:'#0b110b',border:'1px dashed #1e3a1e',borderRadius:5,padding:'5px 10px'}}>

                  ['🏍','<strong>Model &amp; Batch tab</strong> — Fleet grouped by model name. Each model card shows total count and a breakdown by batch stage (Mule, Proto, Pilot, Production, etc.). Use the <strong>Filter by Model</strong> dropdown to isolate one model.'],
                  ['🏢','<strong>VA Summary tab</strong> — Shows only vehicles where Team Ownership = VA. Displays vehicle cards with test details and a team-wise count summary. Useful for VA team internal reviews.'],
                  ['📋','Both views are <strong>read-only for all roles</strong> — they are analytical views, not edit interfaces. Use the Track Vehicles tab to edit any vehicle shown here.'],
                ].map(([ico,t])=>(
                  <div key={ico} className="guide-step">
                    <div style={{fontSize:18,flexShrink:0,width:28,textAlign:'center'}}>{ico}</div>
                    <div className="guide-step-text" dangerouslySetInnerHTML={{__html:t}}/>
                  </div>
                ))}
              </div>
            </div>

            {/* ── Section 8: VA Parking Maps ── */}
            <div className="guide-section-card guide-card-green">
              <div className="guide-section-icon" style={{background:'rgba(16,185,129,0.12)',border:'1px solid rgba(16,185,129,0.25)'}}>🅿️</div>
              <div className="guide-section-title" style={{color:'var(--green)'}}>8 · VA Parking Maps</div>
              <div className="guide-section-desc">Visual slot-by-slot layout of VA Store and VA Bay. See which spots are occupied and which are free — in real time.</div>
              <div className="guide-steps">
                {[
                  ['1','Click <strong>🅿️ VA Parking</strong> in the sidebar to open the parking layout view.'],
                  ['2','Two parking areas are shown: <strong>VA Store</strong> (slots S1–S132, arranged in 4 rows) and <strong>VA Bay</strong> (slots VA1–VA20, in 2 rows with a gangway in between).'],
                  ['3','<strong>Green slots</strong> = available (empty). <strong>Orange/amber slots</strong> = occupied. Hover over any slot to see the chassis number, model, and VMS No of the parked vehicle.'],
                  ['4','Occupancy counters at the top show total slots, how many are occupied, and how many are free — for both Store and Bay separately.'],
                  ['5','The <strong>compass indicator</strong> shows orientation. The VA Bay door is at the upper-right corner. The VA Store entry is at the bottom.'],
                  ['6','A <strong>parked vehicles table</strong> below each map lists all vehicles currently in that area with full details.'],
                  ['7','To assign a parking spot to a vehicle, edit the vehicle (Section 3) and set its Location to <strong>VA Stores</strong> or <strong>VA</strong>, then select an available slot from the Parking Spot dropdown.'],
                ].map(([n,t])=>(
                  <div key={n} className="guide-step">
                    <div className="guide-step-num" style={{background:'rgba(16,185,129,0.2)',color:'var(--green)'}}>{n}</div>
                    <div className="guide-step-text" dangerouslySetInnerHTML={{__html:t}}/>
                  </div>
                ))}
              </div>
              <div className="guide-tip">
                <span style={{fontSize:16,flexShrink:0}}>💡</span>
                <span>Parking spot dropdowns in the Edit popup show <strong>only available slots</strong> for the chosen location. Occupied spots are hidden automatically to prevent double-booking.</span>
              </div>
            </div>

            {/* ── Section 9: Export & Import ── */}
            <div className="guide-section-card guide-card-yellow">
              <div className="guide-section-icon" style={{background:'rgba(245,158,11,0.12)',border:'1px solid rgba(245,158,11,0.25)'}}>⬇️</div>
              <div className="guide-section-title" style={{color:'var(--yellow)'}}>9 · Export &amp; Import Data</div>
              <div className="guide-section-desc">Download the full fleet dataset in Excel, CSV, or JSON. Import new vehicles in bulk from a spreadsheet. A full data reset option is also available for Admins.</div>
              <div className="guide-steps">
                {[
                  ['1','Click <strong>⬇️ Export Data</strong> in the sidebar to open the export/import panel.'],
                  ['2','<strong>Export options:</strong> <code>Excel (.xls)</code> — for Microsoft Excel / Google Sheets &nbsp;|&nbsp; <code>CSV (.csv)</code> — universal format &nbsp;|&nbsp; <code>JSON (.json)</code> — structured data for developers. All formats include every field for all vehicles.'],
                  ['3','<strong>Import (Add New Vehicles):</strong> Click <strong>📂 Choose File to Import</strong> and select a <code>.xlsx / .xls / .csv</code> file. The app reads the first sheet automatically.'],
                  ['4','Column names are matched flexibly — variations like "Chassis No", "chassis_number", or "ChassisNumber" are all recognised. Always include a Chassis Number column.'],
                  ['5','A <strong>preview modal</strong> appears showing: records to be <strong>Added</strong> (new chassis) vs <strong>Skipped</strong> (duplicate chassis already in the system).'],
                  ['6','Click <strong>✅ IMPORT</strong> to confirm, or Cancel to discard. Imported vehicles are instantly live across all views.'],
                  ['7','<strong>Full Data Reset (Admin only, PIN required):</strong> The red <em>Import New Data (Reset Existing)</em> button replaces <em>all</em> current data with the uploaded file. A PIN prompt and confirmation step prevent accidental resets. Use this for monthly master-data refreshes.'],
                  ['8','The export summary panel shows: total vehicle count, fields per record, number of unique projects, models, locations, and teams included.'],
                ].map(([n,t])=>(
                  <div key={n} className="guide-step">
                    <div className="guide-step-num" style={{background:'rgba(245,158,11,0.2)',color:'var(--yellow)'}}>{n}</div>
                    <div className="guide-step-text" dangerouslySetInnerHTML={{__html:t}}/>
                  </div>
                ))}
              </div>
              <div className="guide-tip">
                <span style={{fontSize:16,flexShrink:0}}>💡</span>
                <span><strong style={{color:'var(--yellow)'}}>Recommended workflow:</strong> Export current data → update rows in Excel → use Import to add new vehicles. Existing chassis are automatically skipped so there is no risk of duplication.</span>
              </div>
            </div>

            {/* ── Section 10: Notifications ── */}
            <div className="guide-section-card guide-card-cyan">
              <div className="guide-section-icon" style={{background:'rgba(6,182,212,0.12)',border:'1px solid rgba(6,182,212,0.25)'}}>📲</div>
              <div className="guide-section-title" style={{color:'var(--cyan)'}}>10 · WhatsApp &amp; SMS Notifications</div>
              <div className="guide-section-desc">Whenever a vehicle changes location, the app can send a formatted alert via WhatsApp or SMS with one tap.</div>
              <div className="guide-steps">
                {[
                  ['1','After saving an edit where the <strong>Location field was changed</strong>, a <strong>Notify popup</strong> appears automatically.'],
                  ['2','The popup shows the movement summary: Chassis No, Engine No, Test, <strong>From → To</strong> location, Parking Spot (if VA Stores), and current timestamp.'],
                  ['3','Tap <strong>📲 WhatsApp</strong> to open WhatsApp with a pre-filled message ready to send to the designated contact.'],
                  ['4','Tap <strong>💬 SMS</strong> to open the native SMS app with the same message pre-filled.'],
                  ['5','Tap <strong>Skip</strong> to dismiss the popup without sending any notification.'],
                  ['6','The notification message is formatted with bold labels in WhatsApp, and plain text for SMS — both include the vehicle details and a human-readable timestamp.'],
                ].map(([n,t])=>(
                  <div key={n} className="guide-step">
                    <div className="guide-step-num" style={{background:'rgba(6,182,212,0.2)',color:'var(--cyan)'}}>{n}</div>
                    <div className="guide-step-text" dangerouslySetInnerHTML={{__html:t}}/>
                  </div>
                ))}
              </div>
              <div className="guide-tip">
                <span style={{fontSize:16,flexShrink:0}}>💡</span>
                <span>WhatsApp notifications work best on <strong>mobile devices</strong> where WhatsApp is installed. On desktop, they open WhatsApp Web. SMS works on any device with cellular capability.</span>
              </div>
            </div>

            {/* ── Section 11: Tracking Vehicle Location ── */}
            <div className="guide-section-card guide-card-orange">
              <div className="guide-section-icon" style={{background:'rgba(255,102,0,0.12)',border:'1px solid rgba(255,102,0,0.25)'}}>📍</div>
              <div className="guide-section-title" style={{color:'var(--orange)'}}>11 · Tracking Vehicle Location &amp; History</div>
              <div className="guide-section-desc">Always know exactly where each vehicle is — department, parking slot, last movement date, and test purpose.</div>
              <div className="guide-steps">
                {[
                  ['1','Every vehicle stores: <strong>Location</strong> (department), optional <strong>Parking Spot</strong>, and a <strong>Date</strong> (last location change date).'],
                  ['2','Search by chassis or VMS No — the <strong>Location</strong> field is highlighted in a coloured badge on the result card for instant visibility.'],
                  ['3','The <strong>Date</strong> field shows when the location was <em>last changed</em>. It updates automatically whenever you change Location in the edit form.'],
                  ['4','Use <strong>Location search mode</strong> to list all vehicles currently at a specific department — useful for floor checks and capacity planning.'],
                  ['5','The <strong>🅿️ VA Parking map</strong> shows slot-level location for VA Store and VA Bay vehicles.'],
                  ['6','<strong>Scrapped / Pending for Scrapping</strong> vehicles are shown at the bottom of all results with a red badge — they are excluded from capacity counts.'],
                ].map(([n,t])=>(
                  <div key={n} className="guide-step">
                    <div className="guide-step-num" style={{background:'rgba(255,102,0,0.2)',color:'var(--orange)'}}>{n}</div>
                    <div className="guide-step-text" dangerouslySetInnerHTML={{__html:t}}/>
                  </div>
                ))}
              </div>
            </div>

            {/* ── Section 12: Navigation Tips ── */}
            <div className="guide-section-card guide-card-blue">
              <div className="guide-section-icon" style={{background:'rgba(59,130,246,0.12)',border:'1px solid rgba(59,130,246,0.25)'}}>🧭</div>
              <div className="guide-section-title" style={{color:'var(--blue)'}}>12 · Navigation &amp; App Layout</div>
              <div className="guide-section-desc">How to get around the app on desktop and mobile, and what each tab does.</div>
              <div className="guide-nav-grid">
                {[
                  ['🔍','Track Vehicles','Search and find any vehicle — main daily-use screen'],
                  ['🗺️','Fleet Overview','KPI cards, batch/team charts, top locations, recent activity'],
                  ['📊','Dept Summary','Capacity table for all departments with status badges'],
                  ['🏍','Model & Batch','Fleet grouped by model name and batch stage'],
                  ['🏢','VA Summary','VA team vehicles — test details and team allocation'],
                  ['🅿️','VA Parking','Visual slot map for VA Store (S1–S132) and VA Bay (VA1–VA20)'],
                  ['➕','Add Vehicle','Register a new chassis (Admin only)'],
                  ['⬇️','Export Data','Download as Excel/CSV/JSON · Bulk import · Full reset'],
                  ['📖','How to Use','You are here — complete user guide'],
                ].map(([ico,lbl,desc])=>(
                  <div key={lbl} className="guide-nav-item">
                    <span style={{fontSize:18,flexShrink:0}}>{ico}</span>
                    <div>
                      <div style={{fontWeight:700,fontSize:11,color:'var(--text-primary)',fontFamily:'var(--font-display)',letterSpacing:0.3}}>{lbl}</div>
                      <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2,lineHeight:1.4}}>{desc}</div>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:8}}>
                {[
                  ['Every tab <strong>scrolls to the top</strong> automatically when clicked — no manual scrolling needed.','💡'],
                  ['On <strong>mobile / tablet</strong>, use the bottom navigation bar. On <strong>desktop</strong>, use the left sidebar.','📱'],
                  ['<strong>Switch Role</strong> button (top-right header) lets you switch between Admin and Viewer without logging out.','🔄'],
                  ['The <strong>live clock</strong> in the header shows the current date and time at all times.','🕐'],
                  ['<strong>Toast notifications</strong> (top-right corner, auto-dismiss after 3 seconds) confirm every action — save, import, error.','✅'],
                  ['<strong>Mobile haptic feedback</strong> — the app vibrates subtly on button presses on devices that support it.','📳'],
                ].map(([t,ico],i)=>(
                  <div key={i} className="guide-step">
                    <span style={{fontSize:16,flexShrink:0}}>{ico}</span>
                    <div className="guide-step-text" dangerouslySetInnerHTML={{__html:t}}/>
                  </div>
                ))}
              </div>
            </div>

            {/* ── Section 13: Important Notes ── */}
            <div className="guide-section-card guide-card-red">
              <div className="guide-section-icon" style={{background:'rgba(239,68,68,0.12)',border:'1px solid rgba(239,68,68,0.25)'}}>⚠️</div>
              <div className="guide-section-title" style={{color:'var(--red)'}}>13 · Important Notes &amp; Limitations</div>
              <div className="guide-section-desc">Please read these before making any changes to vehicle data.</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {[

                  '<strong>No duplicate chassis numbers</strong> — The system rejects any vehicle whose chassis number already exists. Each chassis must be globally unique across all vehicles.',
                  '<strong>Location date auto-updates</strong> — Changing the Location field automatically sets today\'s date. Do not manually override the Date field unless correcting a historical record.',
                  '<strong>Admin password required for all edits</strong> — Vehicle creation, editing, importing, adding departments, and editing capacities are all restricted to Admin role. Viewer role is strictly read-only.',
                  '<strong>Full Data Reset is irreversible</strong> — Using the red reset/import button replaces all existing data permanently for that session. Always export a backup before performing a full reset.',
                  '<strong>Parking spots are location-aware</strong> — The parking spot dropdown only shows valid slots for the selected location. Changing location clears the existing spot to prevent invalid assignments.',
                  '<strong>Scrapped vehicles are excluded from capacity</strong> — Vehicles at "Scrapped" or "Pending for Scrapping" do not count toward department capacity calculations.',
                  '<strong>Import column matching is flexible but not guessable</strong> — The importer recognises common header variations. However, always ensure a <code>Chassis Number</code> column is present — the import will fail without it.',
                  '<strong>Data accuracy is your responsibility</strong> — Always verify chassis numbers, engine numbers, and test information before saving. Incorrect entries cannot be auto-corrected.',
                ].map((t,i)=>(
                  <div key={i} className="guide-warning">
                    <span style={{color:'var(--red)',fontSize:15,flexShrink:0,marginTop:1}}>⚠</span>
                    <div className="guide-step-text" dangerouslySetInnerHTML={{__html:t}}/>
                  </div>
                ))}
              </div>
            </div>

            {/* ── Footer ── */}
            <div className="guide-footer">
              <div>
                <div style={{fontFamily:'var(--font-display)',fontSize:14,fontWeight:800,color:'var(--orange)',letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>KTM Vehicle Tracking System</div>
                <div style={{fontSize:11,color:'var(--text-muted)',lineHeight:1.7}}>
                  Developed by <strong style={{color:'var(--text-primary)'}}>Vikas Malwade</strong>, KTM VA Dept<br/>
                  <span style={{fontFamily:'var(--font-mono)',color:'var(--orange)',fontSize:12}}>Mob: 9762174720</span>
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{background:'linear-gradient(135deg,#cc4400,var(--orange))',borderRadius:10,padding:'8px 16px',display:'inline-block',boxShadow:'0 4px 16px var(--orange-glow)'}}>
                  <span style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize:20,color:'white',letterSpacing:4}}>KTM</span>
                </div>
                <div style={{fontSize:9,color:'var(--text-muted)',marginTop:6,letterSpacing:2,textTransform:'uppercase'}}>R&amp;D · Bajaj Auto Ltd.</div>
              </div>
            </div>

          </div>
        )}

        </div>
      </main>

      {/* ========= MOBILE BOTTOM NAV ========= */}
      <nav className="mobile-nav">
        <div className="mobile-nav-inner">
          {sidebarItems.map(item => (
            <div key={item.id}
              className={`mobile-nav-item ${activeTab===item.id?'active':''}`}
              onClick={()=>{triggerHaptic('light');setActiveTab(item.id);window.scrollTo({top:0,behavior:'instant'});}}>
              <span className="nav-icon">{item.icon}</span>
              <span className="nav-label">{item.label.split(' ')[0]}</span>
            </div>
          ))}
        </div>
      </nav>

    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
